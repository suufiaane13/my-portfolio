<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio de Soufiane HAJJI — Développeur Full-Stack & UI/UX Designer. React, TypeScript, Node.js, Tailwind CSS."
    />
    <meta name="theme-color" content="#7c5cff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13131f" media="(prefers-color-scheme: dark)" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:image" content="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Soufiane HAJJI — Développeur Full-Stack & UI/UX Designer</title>
    <script>
      ;(() => {
        const key = 'susu-portfolio-theme'
        const stored = localStorage.getItem(key)
        const theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
        document.documentElement.classList.toggle('dark', theme === 'dark')
        document.documentElement.style.colorScheme = theme
        document.documentElement.dataset.theme = theme
      })()
    </script>
    <style>
      :root {
        --loader-bg: oklch(0.98 0.005 270);
        --loader-text: oklch(0.48 0.02 270);
        --loader-ring-track: rgb(124 92 255 / 0.12);
        --loader-ring-active: oklch(0.55 0.2 280);
      }

      html.dark {
        --loader-bg: oklch(0.13 0.015 270);
        --loader-text: oklch(0.65 0.02 270);
        --loader-ring-track: rgb(124 92 255 / 0.18);
        --loader-ring-active: oklch(0.72 0.18 280);
      }

      html,
      body {
        margin: 0;
        background: var(--loader-bg);
        color-scheme: light dark;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--loader-bg);
      }

      /* Cache le loader HTML dès que React monte dans #root */
      body:has(#root:not(:empty)) #app-loader {
        display: none;
      }

      #app-loader__spinner {
        position: relative;
        width: 7.5rem;
        height: 7.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #app-loader__ring {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        border: 3px solid var(--loader-ring-track);
        border-top-color: var(--loader-ring-active);
        animation: app-loader-spin 0.9s linear infinite;
      }

      #app-loader p {
        margin-top: 2rem;
        font-family: system-ui, sans-serif;
        font-size: 0.875rem;
        color: var(--loader-text);
      }

      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-loader__ring {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" role="status" aria-label="Chargement du portfolio">
      <div id="app-loader__spinner">
        <div id="app-loader__ring" aria-hidden="true"></div>
        <img src="/logo.png" alt="" width="52" height="52" style="position: relative; object-fit: contain" />
      </div>
      <p>Chargement...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
