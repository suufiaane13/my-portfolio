# Empêche la pause du projet Supabase (plan gratuit = inactivité ~7 jours).
# Ne remplace pas Supabase : simple ping lecture sur une vue publique.
#
# Secrets requis (GitHub → Settings → Secrets and variables → Actions) :
#   SUPABASE_URL        → https://xxxx.supabase.co
#   SUPABASE_ANON_KEY   → clé anon (Settings → API)

name: Supabase keep-alive

on:
  schedule:
    # Lundi et jeudi 08:00 UTC — marge avant les 7 jours d'inactivité
    - cron: '0 8 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Secrets SUPABASE_URL et SUPABASE_ANON_KEY manquants dans GitHub Actions."
            exit 1
          fi

          url="${SUPABASE_URL%/}/rest/v1/memory_leaderboard?select=id&limit=1"
          echo "Ping: $url"

          http_code=$(curl -sS -o /tmp/supabase-ping.json -w "%{http_code}" \
            "$url" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP $http_code"
          cat /tmp/supabase-ping.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Supabase keep-alive a échoué (HTTP $http_code)."
            exit 1
          fi

          echo "Supabase keep-alive OK"
